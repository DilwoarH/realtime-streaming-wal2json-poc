services:

  # -------------------------------------------------------------------------
  # PostgreSQL 17 with the wal2json logical decoding plugin
  # -------------------------------------------------------------------------
  postgres:
    build: .
    environment:
      POSTGRES_DB:       testdb_sql_only
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    # Enable logical replication and allocate enough senders / slots
    command: >
      postgres
        -c wal_level=logical
        -c max_replication_slots=10
        -c max_wal_senders=10
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d testdb_sql_only"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
